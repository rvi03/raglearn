# raglearn local stack. `make up` builds and starts it.
# DuckDB is embedded (a file on the api volume), so it is not a service here.

name: raglearn

services:
  raglearn-ollama:
    image: ollama/ollama:latest
    container_name: raglearn-ollama
    ports: ["11434:11434"]
    volumes: [ollama-data:/root/.ollama]
    networks: [raglearn-net]
    restart: unless-stopped

  raglearn-qdrant:
    image: qdrant/qdrant:latest
    container_name: raglearn-qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant-data:/qdrant/storage]
    networks: [raglearn-net]
    restart: unless-stopped

  raglearn-postgres:
    image: postgres:16-alpine
    container_name: raglearn-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raglearn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raglearn}
      POSTGRES_DB: ${POSTGRES_DB:-raglearn}
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [raglearn-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raglearn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  raglearn-redis:
    image: redis:7-alpine
    container_name: raglearn-redis
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    networks: [raglearn-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  raglearn-redpanda:
    image: redpandadata/redpanda:latest
    container_name: raglearn-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      # internal listener for in-network producers (MinIO); external for host CLI/tools.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://raglearn-redpanda:9092,external://localhost:19092
    ports: ["19092:19092", "9644:9644"]
    volumes: [redpanda-data:/var/lib/redpanda/data]
    networks: [raglearn-net]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Content-based format detection. Stateless; the consumer PUTs document bytes
  # and reads back a media type. Pinned for reproducible detection results.
  raglearn-tika:
    image: apache/tika:2.9.2.1
    container_name: raglearn-tika
    ports: ["9998:9998"]
    networks: [raglearn-net]
    restart: unless-stopped

  raglearn-minio:
    image: minio/minio:latest
    container_name: raglearn-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-raglearn}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-raglearn-secret}
      # Kafka notification target "ingest": file events are published to Redpanda.
      # A bucket-level rule binding this target is added by infra/minio/init.sh.
      MINIO_NOTIFY_KAFKA_ENABLE_ingest: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_ingest: raglearn-redpanda:9092
      MINIO_NOTIFY_KAFKA_TOPIC_ingest: ${INGEST_TOPIC:-raglearn-ingest}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
    depends_on:
      raglearn-redpanda: {condition: service_healthy}
    networks: [raglearn-net]
    restart: unless-stopped

  # One-shot: creates the filings bucket and binds its upload events to Redpanda,
  # then exits. Idempotent, so it runs harmlessly on every `up`.
  raglearn-minio-init:
    image: minio/mc:latest
    container_name: raglearn-minio-init
    entrypoint: ["sh", "/init.sh"]
    environment:
      MINIO_ENDPOINT: http://raglearn-minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-raglearn}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-raglearn-secret}
      INGEST_BUCKET: ${INGEST_BUCKET:-filings}
    volumes: ["./minio/init.sh:/init.sh:ro"]
    depends_on:
      raglearn-minio: {condition: service_started}
    networks: [raglearn-net]
    restart: "no"

  raglearn-api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    container_name: raglearn-api
    environment:
      RAGLEARN_ENV: ${RAGLEARN_ENV:-dev}
      RAGLEARN_CONFIG_DIR: /app/config
      RAGLEARN_QDRANT_URL: http://raglearn-qdrant:6333
      RAGLEARN_POSTGRES_DSN: postgresql://${POSTGRES_USER:-raglearn}:${POSTGRES_PASSWORD:-raglearn}@raglearn-postgres:5432/${POSTGRES_DB:-raglearn}
      RAGLEARN_REDIS_URL: redis://raglearn-redis:6379/0
      RAGLEARN_OLLAMA_URL: http://raglearn-ollama:11434
      RAGLEARN_MINIO_ENDPOINT: http://raglearn-minio:9000
      RAGLEARN_TIKA_URL: http://raglearn-tika:9998
    ports: ["8000:8000"]
    volumes: [duckdb-data:/app/data]
    depends_on:
      raglearn-postgres: {condition: service_healthy}
      raglearn-redis: {condition: service_healthy}
      raglearn-qdrant: {condition: service_started}
      raglearn-ollama: {condition: service_started}
      raglearn-minio: {condition: service_started}
      raglearn-tika: {condition: service_started}
    networks: [raglearn-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ollama-data: {}
  qdrant-data: {}
  postgres-data: {}
  redis-data: {}
  minio-data: {}
  redpanda-data: {}
  duckdb-data: {}

networks:
  raglearn-net:
    driver: bridge
